# Builds an installable Android APK and attaches it to a GitHub Release.
# Triggered by pushing a tag named `apk-*` (one per completed phase, see
# docs/RELEASE_PROCESS.md) or manually via workflow_dispatch (build-only,
# no release).
name: Android APK

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: >-
          Optional apk-* tag to create and publish a release for (e.g.
          apk-phase-2). Leave empty for a build-only run that just uploads
          the APK as a workflow artifact.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: 'true'
          EXPO_NO_TELEMETRY: '1'

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      # Stable asset name so the README's
      # releases/latest/download/habithelper.apk link never changes.
      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk habithelper.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: habithelper-apk
          path: habithelper.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/apk-') && github.ref_name || inputs.release_tag }}
          name: ${{ startsWith(github.ref, 'refs/tags/apk-') && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: habithelper.apk
          fail_on_unmatched_files: true
          body: |
            Installable Android APK built from `${{ github.sha }}`.

            Signed with the debug keystore — suitable for sideloading and
            manual testing, not for store distribution (release signing is
            configured in T060).
