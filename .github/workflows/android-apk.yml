# Builds an installable Android APK and attaches it to a GitHub Release.
# Three triggers (see docs/RELEASE_PROCESS.md):
#   1. pushing a tag named `apk-*` (one per completed phase),
#   2. workflow_dispatch with the optional release_tag input,
#   3. a branch push whose commit message contains `[build-apk <tag>]`
#      (fallback for environments that can push neither tags nor to main).
name: Android APK

on:
  push:
    tags:
      - 'apk-*'
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: >-
          Optional apk-* tag to create and publish a release for (e.g.
          apk-phase-2). Leave empty for a build-only run that just uploads
          the APK as a workflow artifact.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    # Plain branch pushes only build when explicitly requested via the
    # commit-message marker; tag pushes and manual dispatches always build.
    if: >-
      startsWith(github.ref, 'refs/tags/apk-') ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build-apk')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: release_tag
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          DISPATCH_TAG: ${{ inputs.release_tag || '' }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/apk-* ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]; then
            tag="$DISPATCH_TAG"
          elif [[ "$COMMIT_MESSAGE" =~ \[build-apk[[:space:]]+([A-Za-z0-9._-]+)\] ]]; then
            tag="${BASH_REMATCH[1]}"
          else
            tag=""
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: '$tag'"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: 'true'
          EXPO_NO_TELEMETRY: '1'

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      # Stable asset name so the README's
      # releases/latest/download/habithelper.apk link never changes.
      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk habithelper.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: habithelper-apk
          path: habithelper.apk

      - name: Publish GitHub Release
        if: steps.release_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: habithelper.apk
          fail_on_unmatched_files: true
          body: |
            Installable Android APK built from `${{ github.sha }}`.

            Signed with the debug keystore — suitable for sideloading and
            manual testing, not for store distribution (release signing is
            configured in T060).
